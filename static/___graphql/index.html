<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GraphiQL — OSCAL Static Site Schema Explorer</title>
    <link rel="stylesheet" href="https://unpkg.com/graphiql@3/graphiql.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { height: 100vh; display: flex; flex-direction: column; font-family: sans-serif; }
      #graphiql { flex: 1; }
      #loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-size: 1.1rem;
        color: #555;
      }
      #error {
        display: none;
        padding: 2rem;
        color: #b91c1c;
        background: #fef2f2;
        border: 1px solid #fca5a5;
        margin: 2rem;
        border-radius: 6px;
        font-family: monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="loading">Loading schema…</div>
    <div id="error"></div>
    <div id="graphiql" style="display:none;flex:1;"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/graphql@16/umd/graphql.js"></script>
    <script crossorigin src="https://unpkg.com/graphiql@3/graphiql.min.js"></script>

    <script>
      const DEFAULT_QUERY = [
        '# OSCAL Static Site — read-only schema explorer',
        '# This schema was exported at build time. Results cannot be executed.',
        '# Use the Docs panel (top-right) to browse types and fields.',
        '',
        'query IntrospectionQuery {',
        '  __schema {',
        '    queryType { name }',
        '    mutationType { name }',
        '    types {',
        '      name',
        '      kind',
        '      description',
        '    }',
        '  }',
        '}',
      ].join('\n');

      // Resolve schema.json relative to the site root regardless of pathPrefix.
      // The page lives at <pathPrefix>/___graphql/index.html
      // schema.json lives at <pathPrefix>/schema.json
      // window.location.pathname gives us the full path including pathPrefix.
      const schemaUrl = window.location.pathname
        .replace(/\/___graphql\/?.*$/, '')   // strip /___graphql/…
        .replace(/\/$/, '')                   // remove trailing slash
        + '/schema.json';

      function showError(msg) {
        document.getElementById('loading').style.display = 'none';
        const el = document.getElementById('error');
        el.style.display = 'block';
        el.textContent = msg;
      }

      fetch(schemaUrl)
        .then(function(r) {
          if (!r.ok) throw new Error('Failed to fetch ' + schemaUrl + ' (' + r.status + ')');
          return r.json();
        })
        .then(function(introspection) {
          if (!introspection || !introspection.data) {
            throw new Error('schema.json is missing a "data" envelope. ' + schemaUrl);
          }

          // Build a schema object so GraphiQL can render the doc explorer without
          // requiring a live GraphQL endpoint.
          const schema = graphql.buildClientSchema(introspection.data);

          // A fetcher that returns the introspection result for the built-in
          // __schema query so Ctrl+Enter doesn't show an error, and a stub for
          // everything else.
          function fetcher(graphQLParams) {
            if (graphQLParams && graphQLParams.query &&
                graphQLParams.query.indexOf('__schema') !== -1) {
              return Promise.resolve(introspection);
            }
            return Promise.resolve({
              data: null,
              errors: [{ message: 'This is a read-only static schema explorer. No live endpoint is available.' }]
            });
          }

          document.getElementById('loading').style.display = 'none';
          const container = document.getElementById('graphiql');
          container.style.display = 'flex';

          const root = ReactDOM.createRoot(container);
          root.render(
            React.createElement(GraphiQL, {
              schema: schema,
              fetcher: fetcher,
              defaultQuery: DEFAULT_QUERY,
            })
          );
        })
        .catch(function(err) {
          showError(
            'Could not load schema.json\n\n' + err.message +
            '\n\nMake sure the site was built with `pnpm run build:gh-pages` ' +
            'and that schema.json was generated by the onPostBuild hook.'
          );
        });
    </script>
  </body>
</html>
